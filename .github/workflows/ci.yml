name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.compiler }} / ${{ matrix.preset }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc-13, clang-18]
        preset: [default, strict]
        include:
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cc }} ${{ matrix.cxx }} cmake ninja-build
      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Test
        run: ctest --preset ${{ matrix.preset }}

  sanitizers:
    name: clang ASan+UBSan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y clang-18 cmake ninja-build
      - name: Configure
        env: { CC: clang-18, CXX: clang++-18 }
        run: cmake --preset asan
      - name: Build
        run: cmake --build --preset asan
      - name: Test
        run: ctest --preset asan

  clang-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y clang-format-18 cmake ninja-build
      - name: Check formatting
        run: |
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format
          cmake --preset default -DBUILD_TESTING=OFF
          cmake --build build --target format-check

  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y clang-18 clang-tidy-18 cmake ninja-build
      - name: Configure
        env: { CC: clang-18, CXX: clang++-18 }
        run: |
          sudo ln -sf /usr/bin/clang-tidy-18 /usr/local/bin/clang-tidy
          cmake --preset tidy
      - name: Build (runs clang-tidy)
        run: cmake --build --preset tidy

  cppcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability --error-exitcode=1 \
            --suppress=missingIncludeSystem --inline-suppr \
            -I include src

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y gcc-13 g++-13 cmake ninja-build python3-pip
      - run: pipx install gcovr || pip install --break-system-packages gcovr
      - name: Configure
        env: { CC: gcc-13, CXX: g++-13 }
        run: cmake --preset coverage
      - name: Build
        run: cmake --build --preset coverage
      - name: Test
        run: ctest --preset coverage
      - name: Generate report
        run: |
          gcovr -r . --filter src/ build-cov --txt=coverage.txt \
            --xml=coverage.xml --xml-pretty --print-summary
          cat coverage.txt
      - uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage.xml

  fuzz-smoke:
    name: libFuzzer smoke (60s)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y clang-18 cmake ninja-build
      - name: Configure
        env: { CC: clang-18, CXX: clang++-18 }
        run: cmake --preset fuzz
      - name: Build
        run: cmake --build --preset fuzz
      - name: Run fuzzer (60s budget)
        run: |
          mkdir -p fuzz-artifacts
          ./build-fuzz/fuzz/fuzz_parse \
            -max_total_time=60 \
            -print_final_stats=1 \
            -artifact_prefix=fuzz-artifacts/ \
            build-fuzz/fuzz/corpus
      - name: Upload crash artefacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: fuzz-crashes
          path: fuzz-artifacts/
          if-no-files-found: ignore
